<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carta para Naomy ❤️</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background: linear-gradient(-45deg,#ff4d6d,#ff8fa3,#ffb3c6,#ffccd5);
    background-size:400% 400%;
    animation: gradientMove 10s ease infinite;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
    color:white;
    overflow:hidden;
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.container{
    max-width:430px;
    width:100%;
    padding:20px;
}

button{
    padding:15px 25px;
    border:none;
    border-radius:30px;
    font-size:18px;
    font-weight:bold;
    background:white;
    color:#ff4d6d;
    cursor:pointer;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

/* SOBRE */
.envelope{
    width:100%;
    max-width:350px;
    height:220px;
    margin:30px auto;
    position:relative;
    perspective:1000px;
    display:none;
}

.flap{
    width:100%;
    height:100%;
    background:#ff758f;
    position:absolute;
    transform-origin:top;
    transition: transform 1s ease;
    border-radius:15px;
}

.letter{
    position:absolute;
    width:90%;
    height:90%;
    background:white;
    color:#c9184a;
    border-radius:15px;
    top:5%;
    left:5%;
    padding:20px;
    box-sizing:border-box;
    overflow:hidden;
    opacity:0;
    transition: opacity 1s ease 0.8s;
}

.show .flap{
    transform: rotateX(-160deg);
}

.show .letter{
    opacity:1;
}
</style>
</head>

<body>

<div class="container">

<button onclick="openLetter()">Lee algo importante 💌</button>

<div class="envelope" id="envelope">
    <div class="flap"></div>
    <div class="letter" id="letterText"></div>
</div>

</div>

<script>

const message = `Naomy…

Desde que llegaste a mi vida,
todo cambió.

No sabía que alguien podía
hacerme sonreír tan fácil,
ni sentirme tan templado
solo con su presencia.

No eres solo mi San Valentín…
eres mi negra favorita.

Gracias por existir, te amo hermosa ❤️`;

function openLetter(){
    const envelope = document.getElementById("envelope");
    envelope.style.display = "block";
    setTimeout(()=>{
        envelope.classList.add("show");
        typeWriter();
    },100);
}

function typeWriter(){
    const textElement = document.getElementById("letterText");
    let i = 0;

    function typing(){
        if(i < message.length){
            textElement.innerHTML += message.charAt(i);
            i++;
            setTimeout(typing, 35);
        }
    }

    typing();
}

</script>

</body>
</html>
