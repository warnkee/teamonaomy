<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pregunta importante 😏</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background: linear-gradient(180deg,#ff4d6d,#ff8fa3);
    text-align:center;
    color:white;
    overflow:hidden;
}

.container{
    max-width:430px;
    margin:auto;
    padding:20px;
    position:relative;
    height:100vh;
}

/* Mensaje dinámico */
.statusMessage{
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
    background:rgba(255,255,255,0.2);
    padding:10px;
    border-radius:20px;
    backdrop-filter:blur(10px);
    transition:0.3s;
}

h1{
    margin-top:20px;
}

img{
    width:100%;
    border-radius:20px;
    margin:20px 0;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.button{
    padding:15px 25px;
    border:none;
    border-radius:30px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    position:absolute;
    transition: all 0.2s ease;
}

#yesBtn{
    background:white;
    color:#ff4d6d;
    left:50%;
    transform:translateX(-50%);
    bottom:130px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

#noBtn{
    background:#c9184a;
    color:white;
    top:75%;
    left:50%;
    transform:translate(-50%, -50%);
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div class="container">

<div class="statusMessage" id="status">
<span id="attempts"></span> 
</div>

<h1>Y ahora la pregunta seria 😏</h1>

<img src="imgs/naomy4.jpeg">

<h2>¿Y me darás el chiquito? 😳</h2>

<button id="yesBtn" class="button" onclick="location.href='final.html'">
    Sí 😈
</button>

<button id="noBtn" class="button">
    No 🙈
</button>

</div>

<script>
const noBtn = document.getElementById("noBtn");
const container = document.querySelector(".container");
const attemptsSpan = document.getElementById("attempts");
const status = document.getElementById("status");

let attempts = 0;

/* Movimiento en PC */
noBtn.addEventListener("mouseenter", handleNoAttempt);

/* Movimiento en iPhone */
noBtn.addEventListener("touchstart", handleNoAttempt);

function handleNoAttempt(){
    attempts++;
    attemptsSpan.textContent = attempts;

    /* Cambiar mensaje psicológico */
if (attempts > 33) {
    status.innerHTML = "Sabe que le quito el boton por necia ahora solo tiene una opcion 😌";

    noBtn.style.opacity = "0";
    noBtn.style.transform = "translate(-50%, -50%) scale(0)";

    setTimeout(() => {
        noBtn.style.display = "none";
    }, 3000);
}
else if (attempts > 28) {
    status.innerHTML = "amor ya no voy a poner mas mensajes";
}
else if (attempts > 26) {
    status.innerHTML = "voy a dormir legal si sigue";
}
else if (attempts > 22) {
    status.innerHTML = "me avisa cuando se aburra";
}
else if (attempts > 17) {
    status.innerHTML = "Va seguiiir? solo toque que SI";
}
else if (attempts > 12) {
    status.innerHTML = "Me esta dando pena ajena amor";
}
else if (attempts > 7) {
    status.innerHTML = "Sabe que yo controlo todo verdad?";
}
else if (attempts > 4) {
    status.innerHTML = "Que te dije?";
}
else if (attempts > 1) {
    status.innerHTML = "Amor… no siga";
}


    moveButton();
}

function moveButton(){

    const containerRect = container.getBoundingClientRect();
    const btnRect = noBtn.getBoundingClientRect();

    /* Margen de seguridad para que NO toque los bordes */
    const padding = 40;

    const maxX = containerRect.width - btnRect.width - padding;
    const maxY = containerRect.height - btnRect.height - padding;

    const minX = padding;
    const minY = containerRect.height * 0.4; // evita que suba demasiado

    const randomX = Math.random() * (maxX - minX) + minX;
    const randomY = Math.random() * (maxY - minY) + minY;

    noBtn.style.left = randomX + "px";
    noBtn.style.top = randomY + "px";
}
</script>

</body>
</html>
