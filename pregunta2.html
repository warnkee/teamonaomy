<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pregunta importante 😏</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(180deg,#ff4d6d,#ff8fa3);
    text-align:center;
    color:white;
    overflow:hidden;
}

/* Pantalla de cuenta regresiva */
#intro{
    position:fixed;
    width:100%;
    height:100vh;
    background:linear-gradient(180deg,#590d22,#800f2f);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:10;
    transition:opacity 0.8s ease;
}

#intro h2{
    font-size:22px;
    margin-bottom:20px;
}

#countdown{
    font-size:70px;
    font-weight:bold;
}

/* Contenido principal oculto al inicio */
.container{
    max-width:430px;
    margin:auto;
    padding:20px;
    position:relative;
    height:100vh;
    opacity:0;
    transition:opacity 1s ease;
}

h1{
    margin-top:40px;
    font-size:24px;
}

img{
    width:100%;
    border-radius:20px;
    margin:20px 0;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.button{
    padding:15px 25px;
    border:none;
    border-radius:30px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    position:absolute;
    transition: all 0.2s ease;
}

#yesBtn{
    background:white;
    color:#ff4d6d;
    left:50%;
    transform:translateX(-50%);
    bottom:130px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

#noBtn{
    background:#c9184a;
    color:white;
    top:75%;
    left:50%;
    transform:translate(-50%, -50%);
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<!-- Intro dramática -->
<div id="intro">
    <h2>Preparando pregunta importante…</h2>
    <div id="countdown">3</div>
</div>

<!-- Contenido principal -->
<div class="container" id="mainContent">

<h1>Y ahora la pregunta seria 😏</h1>

<img src="imgs/naomy4.jpeg">

<h2>¿Y me darás el chiquito? 😳</h2>

<button id="yesBtn" class="button" onclick="location.href='final.html'">
    Sí 😈
</button>

<button id="noBtn" class="button">
    No 🙈
</button>

</div>

<script>
/* CUENTA REGRESIVA */
let count = 3;
const countdownElement = document.getElementById("countdown");
const intro = document.getElementById("intro");
const mainContent = document.getElementById("mainContent");

const interval = setInterval(() => {
    count--;
    if(count > 0){
        countdownElement.textContent = count;
    } else {
        clearInterval(interval);
        intro.style.opacity = "0";
        setTimeout(()=>{
            intro.style.display = "none";
            mainContent.style.opacity = "1";
        },800);
    }
},1000);

/* BOTÓN ESCAPISTA */
const noBtn = document.getElementById("noBtn");
const container = document.querySelector(".container");

noBtn.addEventListener("mouseenter", moveButton);
noBtn.addEventListener("touchstart", moveButton);

function moveButton(){

    const containerRect = container.getBoundingClientRect();
    const btnRect = noBtn.getBoundingClientRect();

    const maxX = containerRect.width - btnRect.width;
    const maxY = containerRect.height - btnRect.height;

    const randomX = Math.random() * maxX;
    const randomY = Math.random() * maxY;

    noBtn.style.left = randomX + "px";
    noBtn.style.top = randomY + "px";
}
</script>

</body>
</html>
